services:
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./bot:/app/bot
      - ./shared:/app/shared
      - ./tracker:/app/tracker
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - db

  tracker:
    build:
      context: .
      dockerfile: tracker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./tracker:/app/tracker
      - ./shared:/app/shared
      - ./bot:/app/bot
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # redis:
  #   image: redis:alpine
  #   restart: unless-stopped
  #   ports:
      # - "6379:6379"

volumes:
  postgres_data: