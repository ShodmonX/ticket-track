services:
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  tracker:
    build:
      context: .
      dockerfile: tracker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # redis:
  #   image: redis:alpine
  #   restart: unless-stopped
  #   ports:
      # - "6379:6379"

volumes:
  postgres_data: